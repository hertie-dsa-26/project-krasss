<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Climate & Health Explorer{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #2d4f38; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #72b588; text-decoration: none; font-size: 14px; margin-left: 20px; }
        nav a:first-child { font-weight: bold; font-size: 16px; color: #dce8e0; }
        nav a:hover { color: #dce8e0; }
        main { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
        h1 { font-size: 28px; margin-bottom: 16px; color: #2d4f38; }
        p { color: #666; line-height: 1.6; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Climate & Health Explorer</a>
        <div>
            <a href="/docs">Docs</a>
            <a href="/explore">Explore</a>
            <a href="/predict">Predict</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
